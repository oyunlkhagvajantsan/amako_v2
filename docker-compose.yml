version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: amako-db-local
    restart: always
    environment:
      POSTGRES_USER: amako_user
      POSTGRES_PASSWORD: amako_password
      POSTGRES_DB: amako_local
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: amako-app-local
    ports:
      - "3001:3000"
    env_file:
      - .env.docker
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db

volumes:
  postgres_data:
